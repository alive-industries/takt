# Cloud Build pipeline for Takt API.
# Trigger: push to main, path filter `server/**`.
#
# Substitutions:
#   _REGION         e.g. europe-west1 (match your BQ location)
#   _SERVICE        cloud run service name (default: takt-api)
#   _AR_REPO        artifact registry repo name (default: takt)
#   _SA             runtime service account email
#   _BQ_DATASET     BigQuery analytics dataset (default: takt)
#   _CLOUD_SQL_INSTANCE, _DB_URL_SECRET, _MIGRATION_JOB, _EXPORT_JOB
#
# Production deploy (defaults):
#   gcloud builds submit --config=server/cloudbuild.yaml .
#
# Test deploys must override the service, dataset, Cloud SQL instance, database
# secret, and both job names together. See AGENTS.md for the complete command.

substitutions:
  _REGION: europe-west1
  _SERVICE: takt-api
  _AR_REPO: takt
  _SA: takt-api@cost-tracker-490815.iam.gserviceaccount.com
  _GITHUB_ORG: alive-industries
  _BQ_LOCATION: EU
  _BQ_DATASET: takt
  _CLOUD_SQL_INSTANCE: cost-tracker-490815:europe-west1:takt-db
  _DB_URL_SECRET: takt-database-url
  _API_KEY_SECRET: takt-api-key
  _MIGRATION_JOB: takt-migrate
  _EXPORT_JOB: takt-export-bigquery

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: server
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}"]

  - id: deploy-migration-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_MIGRATION_JOB}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
      - --region=${_REGION}
      - --service-account=${_SA}
      - --set-cloudsql-instances=${_CLOUD_SQL_INSTANCE}
      - --set-secrets=TAKT_DATABASE_URL=${_DB_URL_SECRET}:latest
      - --command=alembic
      - --args=upgrade,head

  - id: run-migrations
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - ${_MIGRATION_JOB}
      - --region=${_REGION}
      - --wait

  - id: deploy-export-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_EXPORT_JOB}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
      - --region=${_REGION}
      - --service-account=${_SA}
      - --set-cloudsql-instances=${_CLOUD_SQL_INSTANCE}
      - --set-env-vars=TAKT_GCP_PROJECT=$PROJECT_ID,TAKT_BQ_DATASET=${_BQ_DATASET},TAKT_BQ_LOCATION=${_BQ_LOCATION}
      - --set-secrets=TAKT_DATABASE_URL=${_DB_URL_SECRET}:latest
      - --command=python
      - --args=scripts/export_bigquery.py

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SA}
      - --allow-unauthenticated
      - --add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}
      - --set-env-vars=TAKT_GCP_PROJECT=$PROJECT_ID,TAKT_BQ_DATASET=${_BQ_DATASET},TAKT_BQ_LOCATION=${_BQ_LOCATION},TAKT_GITHUB_ORG=${_GITHUB_ORG}
      - --set-secrets=TAKT_API_KEY=${_API_KEY_SECRET}:latest,TAKT_DATABASE_URL=${_DB_URL_SECRET}:latest
      - --max-instances=10
      - --concurrency=40
      - --cpu=1
      - --memory=512Mi
      - --timeout=30s

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}

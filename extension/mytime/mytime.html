<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Takt — My Time</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #1f2328;
      background: #f6f8fa;
      padding: 32px;
    }
    .container {
      max-width: 860px;
      margin: 0 auto;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-header h1 svg { fill: #656d76; }
    .header-actions { display: flex; gap: 8px; }
    .btn {
      padding: 6px 14px;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      color: #1f2328;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: #f6f8fa; }
    .btn--primary {
      background: #1f883d;
      color: #fff;
      border-color: #1f883d;
    }
    .btn--primary:hover { background: #1a7f37; }
    .btn--danger {
      color: #d1242f;
      border-color: #d1d9e0;
    }
    .btn--danger:hover { background: #ffebe9; }
    .btn--sm { padding: 3px 8px; font-size: 12px; }

    /* Filters */
    .filters {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filters label {
      font-size: 12px;
      font-weight: 600;
      color: #656d76;
    }
    .filters select, .filters input[type="date"] {
      padding: 5px 8px;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }

    /* Summary */
    .summary {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    .summary-card {
      background: #fff;
      border: 1px solid #d1d9e0;
      border-radius: 8px;
      padding: 12px 16px;
      flex: 1;
    }
    .summary-card .label {
      font-size: 11px;
      font-weight: 600;
      color: #656d76;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .summary-card .value {
      font-size: 20px;
      font-weight: 600;
      margin-top: 2px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }

    /* Table */
    .table-wrap {
      background: #fff;
      border: 1px solid #d1d9e0;
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead { background: #f6f8fa; }
    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #656d76;
      border-bottom: 1px solid #d1d9e0;
    }
    td {
      padding: 8px 12px;
      font-size: 13px;
      border-bottom: 1px solid #eaeef2;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f6f8fa; }
    .mono {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }
    .muted { color: #656d76; }
    .empty-state {
      padding: 32px;
      text-align: center;
      color: #656d76;
    }
    .td-actions { text-align: right; white-space: nowrap; }
    td a { color: #0969da; text-decoration: none; }
    td a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>
        <svg width="20" height="20" viewBox="0 0 16 16">
          <path d="M8 0a8 8 0 110 16A8 8 0 018 0zm0 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM8 3a.75.75 0 01.75.75v3.69l2.28 2.28a.75.75 0 01-1.06 1.06l-2.5-2.5A.75.75 0 017.25 8V3.75A.75.75 0 018 3z"/>
        </svg>
        My Time
      </h1>
      <div class="header-actions">
        <button class="btn btn--primary" id="btn-export">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14ZM7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06Z"/></svg>
          Export CSV
        </button>
      </div>
    </div>

    <div class="filters">
      <label>Repo</label>
      <select id="filter-repo"><option value="">All repos</option></select>
      <label>From</label>
      <input type="date" id="filter-from">
      <label>To</label>
      <input type="date" id="filter-to">
    </div>

    <div class="summary">
      <div class="summary-card">
        <div class="label">Total entries</div>
        <div class="value" id="summary-count">0</div>
      </div>
      <div class="summary-card">
        <div class="label">Total hours</div>
        <div class="value" id="summary-hours">0.00</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Repo</th>
            <th>Issue</th>
            <th>Duration</th>
            <th>Hours</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="sessions-body"></tbody>
      </table>
    </div>
  </div>

  <script src="mytime.js"></script>
</body>
</html>
